# FishboneChain progressive TPS deployment profile.
# This profile isolates each child chain on three VMs while keeping every
# child validator inside the 18-validator mainchain set.

[cluster]
name       = "fishbone-progressive-18vm"
binary     = "/home/debian/fishbone/bin/fishbone-node"
base_dir   = "/home/debian/fishbone"
log_dir    = "/home/debian/fishbone/logs"
sudo_pass  = "debian"

[chains.main]
id       = "fishbone_main"
spec     = "specs/main-custom-raw.json"
p2p_port = 30333
rpc_port = 9944
prom_port = 9615

[chains.child1]
id       = "fishbone_child_1"
spec     = "specs/child1-custom-raw.json"
binary   = "/home/debian/fishbone/bin/fishbone-node-crowdsource"
p2p_port = 30334
rpc_port = 9945
prom_port = 9616

[chains.child2]
id       = "fishbone_child_2"
spec     = "specs/child2-custom-raw.json"
binary   = "/home/debian/fishbone/bin/fishbone-node-crowdsource-2s"
p2p_port = 30335
rpc_port = 9946
prom_port = 9617

[chains.child3]
id       = "fishbone_child_3"
spec     = "specs/child3-custom-raw.json"
binary   = "/home/debian/fishbone/bin/fishbone-node-crowdsource-2s"
p2p_port = 30336
rpc_port = 9947
prom_port = 9618

[chains.child4]
id       = "fishbone_child_4"
spec     = "specs/child4-custom-raw.json"
binary   = "/home/debian/fishbone/bin/fishbone-node-crowdsource-v1"
p2p_port = 30337
rpc_port = 9948
prom_port = 9619

[chains.child5]
id       = "fishbone_child_5"
spec     = "specs/child5-custom-raw.json"
binary   = "/home/debian/fishbone/bin/fishbone-node-crowdsource-v2"
p2p_port = 30338
rpc_port = 9949
prom_port = 9620

[chains.child6]
id       = "fishbone_child_6"
spec     = "specs/child6-custom-raw.json"
binary   = "/home/debian/fishbone/bin/fishbone-node-crowdsource-v3"
p2p_port = 30339
rpc_port = 9950
prom_port = 9621

[[nodes]]
id = "f1"
ip = "10.2.2.11"
ssh = "f1"
roles = ["main", "child1"]

