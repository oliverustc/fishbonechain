# FishboneChain 多节点部署配置
# 单一真相来源：所有节点参数在此定义

[cluster]
name       = "fishbone-testnet"
binary     = "/home/debian/fishbone/bin/fishbone-node"
base_dir   = "/home/debian/fishbone"
log_dir    = "/home/debian/fishbone/logs"
sudo_pass  = "debian"

# 跳板机（开发机不能直连 10.2.2.x，通过 bcg 做 SSH/HTTP 中转）
[gateway]
ssh        = "bcg"             # SSH Host alias
ip         = "192.168.8.41"

# ── 链定义 ───────────────────────────────────────────────────────────────────
# binary: 可选，不填则使用 cluster.binary；容量线性扩展实验中 1..6 子链统一使用默认 binary

[chains.main]
id       = "fishbone_main"
spec     = "specs/main-custom-raw.json"
p2p_port = 30333
rpc_port = 9944
prom_port = 9615

[chains.child1]
# 城市快递配送确认（基准链，AURA-3，6s 出块，10min Sc）
# 验证人：f1 f2 f3
id       = "fishbone_child_1"
spec     = "specs/child1-custom-raw.json"
p2p_port = 30334
rpc_port = 9945
prom_port = 9616

[chains.child2]
# 实时城市交通感知（容量线性扩展实验：AURA-3，默认 runtime）
# 验证人：f4 f5 f6
id       = "fishbone_child_2"
spec     = "specs/child2-custom-raw.json"
p2p_port = 30335
rpc_port = 9946
prom_port = 9617

[chains.child3]
# 专业医疗影像标注（容量线性扩展实验：AURA-3，默认 runtime）
# 验证人：f7 f8 f9
id       = "fishbone_child_3"
spec     = "specs/child3-custom-raw.json"
p2p_port = 30336
rpc_port = 9947
prom_port = 9618

[chains.child4]
# 金融支付凭证核验（高安全性，AURA-7，6s 出块，20min Sc）
# 验证人：f1 f2 f3 f4 f5 f6 f7（7 个，BFT f=2）
id       = "fishbone_child_4"
spec     = "specs/child4-custom-raw.json"
p2p_port = 30337
rpc_port = 9948
prom_port = 9619

[chains.child5]
# 野外科学传感器网络（容量线性扩展实验：AURA-3，默认 runtime）
# 验证人：f10 f11 f12
id       = "fishbone_child_5"
spec     = "specs/child5-custom-raw.json"
p2p_port = 30338
rpc_port = 9949
prom_port = 9620

[chains.child6]
# 去中心化数据市场（AURA-5，6s 出块）
id       = "fishbone_child_6"
spec     = "specs/child6-custom-raw.json"
p2p_port = 30339
rpc_port = 9950
prom_port = 9621

# ── 节点定义 ──────────────────────────────────────────────────────────────────
# roles: 该节点参与哪些链（validator）
# peer_ids: 在各链上的 libp2p Peer ID（由 generate-keys.py 填充）
# 子链矿工 ⊆ 主链矿工（论文核心约束）

[[nodes]]
id      = "f1"
ip      = "10.2.2.11"
ssh     = "f1"
roles   = ["main", "child1", "child4", "child6"]

